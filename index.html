<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LEGACY</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0d;
      color: #e0e0e0;
      font-family: monospace;
      font-size: 14px;
      padding: 16px;
    }

    #app {
      max-width: 880px; margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 200px;
      grid-template-rows: auto 1fr auto;
      gap: 16px;
      align-items: start;
    }
    .main-col { display: flex; flex-direction: column; gap: 16px; grid-row: 1 / 3; }
    .debug    { grid-column: 1 / -1; }

    /* HUD */
    .hud__argent   { font-size: 1.4em; font-weight: bold; }
    .hud__meta     { color: #888; font-size: 0.85em; margin-top: 4px; }

    /* Jauges */
    .jauges        { display: flex; flex-direction: column; gap: 6px; }
    .jauge         { display: flex; align-items: center; gap: 8px; }
    .jauge__nom    { width: 80px; text-transform: capitalize; color: #aaa; }
    .jauge__piste  { flex: 1; height: 10px; background: #2a2a2a; border-radius: 5px; overflow: hidden; }
    .jauge__barre  { height: 100%; border-radius: 5px; transition: width 0.2s; }
    .jauge__barre--vert   { background: #4caf50; }
    .jauge__barre--orange { background: #ff9800; }
    .jauge__barre--rouge  { background: #f44336; }
    .jauge__valeur { width: 32px; text-align: right; color: #888; }

    /* Bouton clic */
    .zone-clic     { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .btn-clic      { padding: 16px 32px; font-size: 1.1em; font-family: monospace; cursor: pointer;
                     border: 2px solid currentColor; background: transparent; border-radius: 6px;
                     transition: transform 0.05s; }
    .btn-clic:active { transform: scale(0.97); }
    .btn-clic__multi { margin-left: 8px; font-size: 0.8em; opacity: 0.7; }

    .btn-clic--gris   { color: #9e9e9e; }
    .btn-clic--blanc  { color: #ffffff; }
    .btn-clic--jaune  { color: #ffeb3b; }
    .btn-clic--orange { color: #ff9800; }
    .btn-clic--or     { color: #ffd700; }

    .revenu-par-clic { color: #666; font-size: 0.85em; }

    /* Floating text au clic */
    .btn-clic-wrap { position: relative; display: inline-block; }
    .zone-clic__flottants {
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);
      pointer-events: none;
      width: 0;
    }
    .flottant {
      position: absolute;
      bottom: 4px;
      left: 50%;
      color: #4caf50;
      font-weight: bold;
      font-size: 1em;
      white-space: nowrap;
      animation: flotter 0.8s ease-out forwards;
    }
    @keyframes flotter {
      from { opacity: 1; transform: translateX(-50%) translateY(0); }
      to   { opacity: 0; transform: translateX(-50%) translateY(-48px); }
    }

    /* Menus */
    .menus   { display: flex; gap: 8px; }
    .menus button { flex: 1; padding: 8px; font-family: monospace; cursor: pointer;
                    background: #1a1a1a; color: #ccc; border: 1px solid #333; border-radius: 4px; }
    .menus button:hover { background: #252525; }

    .panel   { background: #141414; border: 1px solid #333; border-radius: 6px; padding: 16px; }
    .panel h2 { text-transform: capitalize; margin-bottom: 8px; }
    .panel button { margin-top: 12px; padding: 6px 12px; font-family: monospace;
                    cursor: pointer; background: #222; color: #aaa; border: 1px solid #444; border-radius: 4px; }

    /* Upgrades list */
    .upgrades-list { list-style: none; display: flex; flex-direction: column; gap: 8px; margin-top: 4px; }
    .upgrade-item { padding: 10px; border: 1px solid #333; border-radius: 4px; }
    .upgrade-item--disponible { border-color: #4caf50; }
    .upgrade-item--trop-cher  { opacity: 0.8; }
    .upgrade-item--verrouille { opacity: 0.45; }
    .upgrade-item--achete     { opacity: 0.5; border-color: #2a2a2a; }
    .upgrade-header { display: flex; justify-content: space-between; margin-bottom: 4px; }
    .upgrade-nom    { font-weight: bold; }
    .upgrade-cout   { color: #aaa; }
    .upgrade-cout--rouge { color: #f44336; font-weight: bold; }
    .upgrade-footer { display: flex; justify-content: space-between; align-items: center; }
    .upgrade-effet  { color: #888; font-size: 0.85em; }
    .upgrade-cadenas { font-size: 1em; }
    .upgrade-check  { color: #4caf50; font-weight: bold; }
    .upgrade-btn { padding: 4px 10px; font-family: monospace; cursor: pointer;
                   background: #1e3a1e; color: #4caf50; border: 1px solid #4caf50; border-radius: 3px; }
    .upgrade-btn:disabled { cursor: not-allowed; background: #1a1a1a; color: #555; border-color: #333; }

    /* Niveau Commerce */
    .niveau-commerce { margin-bottom: 12px; }
    .niveau-commerce__header { display: flex; justify-content: space-between; margin-bottom: 4px; }
    .niveau-commerce__palier { font-weight: bold; color: #e0e0e0; }
    .niveau-commerce__niv    { color: #ffeb3b; font-size: 0.9em; }
    .xp-piste  { height: 8px; background: #2a2a2a; border-radius: 4px; overflow: hidden; margin-bottom: 3px; }
    .xp-barre  { height: 100%; background: #2196f3; border-radius: 4px; transition: width 0.3s; }
    .xp-label  { color: #666; font-size: 0.8em; text-align: right; }

    /* Boutique latérale */
    .boutique-panel {
      background: #141414; border: 1px solid #333; border-radius: 6px;
      padding: 12px; position: sticky; top: 16px;
    }
    .boutique-panel__titre { font-size: 1em; font-weight: bold; margin-bottom: 10px; color: #ccc; border-bottom: 1px solid #2a2a2a; padding-bottom: 6px; }
    .boutique-flottants { position: relative; height: 24px; }
    .boutique-flottant  {
      position: absolute; left: 0; top: 0;
      color: #4caf50; font-weight: bold; font-size: 0.85em; white-space: nowrap;
      animation: flotter 0.8s ease-out forwards;
    }
    .boutique-liste { list-style: none; display: flex; flex-direction: column; gap: 8px; }
    .boutique-item  { display: flex; flex-direction: column; gap: 4px; padding: 8px; border: 1px solid #2a2a2a; border-radius: 4px; }
    .boutique-item--disabled { opacity: 0.5; }
    .boutique-item__label { font-size: 0.85em; color: #ddd; }
    .boutique-item__prix  { font-size: 0.8em; color: #888; }
    .boutique-item__btn {
      padding: 4px 8px; font-family: monospace; font-size: 0.8em; cursor: pointer;
      background: #1e3a1e; color: #4caf50; border: 1px solid #4caf50; border-radius: 3px;
    }
    .boutique-item__btn:disabled { cursor: not-allowed; background: #1a1a1a; color: #555; border-color: #333; }

    /* Debug */
    .debug { border-top: 1px solid #222; padding-top: 8px; display: flex; gap: 8px; }
    .debug button { padding: 6px 12px; font-family: monospace; cursor: pointer;
                    background: #111; color: #555; border: 1px solid #2a2a2a; border-radius: 4px; }
    .debug__mort { color: #c62828 !important; border-color: #5a1a1a !important; }

    /* Écran de fin de vie */
    .overlay-mort {
      position: fixed; inset: 0;
      background: rgba(0, 0, 0, 0.88);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
    }
    .ecran-mort {
      background: #111; border: 1px solid #444; border-radius: 8px;
      padding: 32px; max-width: 420px; width: 100%;
      display: flex; flex-direction: column; gap: 20px;
      font-family: monospace;
    }
    .ecran-mort__titre { font-size: 1.6em; color: #e0e0e0; border-bottom: 1px solid #333; padding-bottom: 12px; }
    .ecran-mort__resume { display: flex; flex-direction: column; gap: 6px; color: #ccc; }
    .ecran-mort__nom    { font-size: 1.2em; font-weight: bold; color: #fff; }
    .ecran-mort__competences h2 { font-size: 0.9em; color: #888; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
    .ecran-mort__liste-comp { list-style: none; display: flex; flex-wrap: wrap; gap: 8px; }
    .ecran-mort__comp-item  { background: #1a1a1a; border: 1px solid #333; border-radius: 4px;
                               padding: 4px 10px; display: flex; gap: 8px; align-items: center; }
    .ecran-mort__comp-secteur { text-transform: capitalize; color: #aaa; }
    .ecran-mort__comp-niv     { color: #ffeb3b; font-size: 0.85em; }
    .ecran-mort__btn {
      padding: 12px 24px; font-family: monospace; font-size: 1em; cursor: pointer;
      background: #1a2e1a; color: #4caf50; border: 1px solid #4caf50; border-radius: 5px;
      align-self: flex-end;
    }
    .ecran-mort__btn:hover { background: #223a22; }
  </style>
</head>
<body>

  <div id="mount"></div>

  <!-- Vue 3 CDN -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

  <script type="module">
    import { AppRoot, JaugeBar } from './src/ui.js'
    import { startEngine }       from './src/engine.js'

    const { createApp } = Vue

    const app = createApp(AppRoot)
    app.component('jauge-bar', JaugeBar)
    app.mount('#mount')

    // Démarrage automatique du moteur au chargement
    startEngine()
  </script>

</body>
</html>
