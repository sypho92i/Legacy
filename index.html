<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LEGACY</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0d;
      color: #e0e0e0;
      font-family: monospace;
      font-size: 14px;
      height: 100vh;
      overflow: hidden;
    }

    #app {
      display: grid;
      grid-template-columns: 220px 1fr;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Sidebar gauche ─────────────────────────────────────────── */
    .sidebar {
      display: flex; flex-direction: column;
      height: 100vh; overflow-y: auto;
      background: #111; border-right: 1px solid #222;
      padding: 12px; gap: 10px;
    }

    /* Sprite personnage — 48×64 px CSS pur */
    #sprite-perso {
      width: 48px; height: 64px;
      position: relative;
      margin: 0 auto;
      flex-shrink: 0;
    }
    #sprite-perso::before { /* tête */
      content: '';
      position: absolute;
      top: 0; left: 12px;
      width: 24px; height: 24px;
      border-radius: 50%;
      background: #fbbf24; border: 2px solid #d97706;
    }
    #sprite-perso::after { /* corps */
      content: '';
      position: absolute;
      bottom: 0; left: 8px;
      width: 32px; height: 34px;
      border-radius: 4px 4px 0 0;
    }
    /* Variantes par tranche d'âge */
    #sprite-perso.sprite--jeune::after  { background: #3b82f6; border: 2px solid #1d4ed8; }
    #sprite-perso.sprite--adulte::after { background: #8b5cf6; border: 2px solid #6d28d9; }
    #sprite-perso.sprite--senior::after { background: #d97706; border: 2px solid #b45309; }
    #sprite-perso.sprite--vieux::after  { background: #6b7280; border: 2px solid #4b5563; }
    #sprite-perso.sprite--vieux::before { background: #d1d5db; border-color: #9ca3af; }

    .sidebar-identite { display: flex; flex-direction: column; gap: 2px; }
    .sidebar-identite__nom  { font-size: 0.95em; font-weight: bold; color: #e0e0e0; }
    .sidebar-identite__meta { font-size: 0.78em; color: #888; }

    .sidebar-karma { font-size: 0.78em; color: #888; }

    .sidebar-finances {
      display: flex; flex-direction: column; gap: 2px;
      padding: 8px; background: #0f0f0f; border: 1px solid #222; border-radius: 4px;
    }
    .sidebar-argent    { font-size: 1.05em; font-weight: bold; }
    .cashflow-positif  { font-size: 0.85em; color: #4caf50; }
    .cashflow-negatif  { font-size: 0.85em; color: #f44336; animation: pulse-rouge 1.2s ease-in-out infinite; }

    .sidebar-nav { display: flex; flex-direction: column; gap: 4px; }
    .sidebar-nav__btn {
      width: 100%; padding: 6px 8px; font-family: monospace; font-size: 0.82em;
      text-align: left; cursor: pointer;
      background: #1a1a1a; color: #ccc; border: 1px solid #2a2a2a; border-radius: 4px;
    }
    .sidebar-nav__btn:hover { background: #222; }
    .sidebar-nav__btn--actif { border-color: #7c3aed; color: #a78bfa; background: #1a1033; }
    .sidebar-nav__btn--pulse-rouge {
      border-color: #f44336; color: #f44336;
      animation: pulse-rouge 1.2s ease-in-out infinite;
    }

    /* Bouton Travailler — ancré en bas de zone-centrale */
    .btn-travailler-wrap {
      position: relative; flex-shrink: 0;
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      padding: 12px; width: 100%; max-width: 580px;
    }
    .bande-finances {
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; gap: 16px;
      padding: 10px 16px; width: 100%; max-width: 580px;
      background: #0f0f0f; border-top: 1px solid #222;
      font-size: 1.1em;
      position: sticky; bottom: 0; z-index: 5;
    }
    .bande-finances__solde  { font-size: 1.3em; font-weight: bold; color: #e0e0e0; }
    .bande-finances__sep    { color: #333; }
    .bande-finances__passifs { font-size: 1.1em; font-weight: bold; }
    .btn-travailler {
      min-width: 200px; max-width: 320px; padding: 14px 32px;
      font-family: monospace; font-size: 1em; font-weight: bold;
      cursor: pointer;
      background: #052e16; color: #22c55e;
      border: 2px solid #22c55e; border-radius: 6px;
      transition: background 0.1s, border-color 0.3s;
    }
    .btn-travailler:active { background: #0a3d1f; }

    /* Zone centrale ─────────────────────────────────────────────── */
    .zone-centrale {
      display: flex; flex-direction: column;
      overflow: hidden; position: relative;
      align-items: center;
    }
    .debug { border-top: 1px solid #222; padding: 8px; display: flex; gap: 8px; flex-shrink: 0; }

    /* Jauges — dans la sidebar, compactes */
    .jauges        { display: flex; flex-direction: column; gap: 4px; }
    .jauge         { display: flex; align-items: center; gap: 6px; }
    .jauge__nom    { width: 62px; font-size: 0.78em; text-transform: capitalize; color: #888; flex-shrink: 0; }
    .jauge__piste  { flex: 1; height: 7px; background: #2a2a2a; border-radius: 4px; overflow: hidden; }
    .jauge__barre  { height: 100%; border-radius: 4px; transition: width 0.2s; }
    .jauge__barre--vert   { background: #4caf50; }
    .jauge__barre--orange { background: #ff9800; }
    .jauge__barre--rouge  { background: #f44336; }
    .jauge__valeur { width: 26px; text-align: right; font-size: 0.78em; color: #666; }

    .multiplicateur-diamant { font-size: 0.85em; font-weight: bold; transition: color 0.3s; color: #888; }
    .revenu-par-clic { color: #555; font-size: 0.75em; }

    /* Floating texts — positionnés par rapport au btn-travailler-wrap */
    .btn-travailler-wrap { position: relative; }
    .zone-clic__flottants {
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);
      pointer-events: none;
      width: 0;
    }
    .flottant {
      position: absolute;
      bottom: 4px; left: 50%;
      color: #4caf50; font-weight: bold; font-size: 1em;
      white-space: nowrap;
      animation: flotter 0.8s ease-out forwards;
    }
    .flottant--positif { color: #22c55e; font-weight: bold; font-size: 1.1em; }
    .flottant--negatif { color: #ef4444; font-weight: bold; }
    .flottant--neutre  { color: #facc15; }
    @keyframes flotter {
      from { opacity: 1; transform: translateX(-50%) translateY(0); }
      to   { opacity: 0; transform: translateX(-50%) translateY(-48px); }
    }

    @keyframes pulse-rouge {
      0%   { box-shadow: 0 0 0 0 rgba(244, 67, 54, 0.5); }
      60%  { box-shadow: 0 0 0 5px rgba(244, 67, 54, 0); }
      100% { box-shadow: 0 0 0 0 rgba(244, 67, 54, 0); }
    }

    .panel   { background: #141414; border: 1px solid #333; border-radius: 6px; padding: 16px; }
    .panel h2 { text-transform: capitalize; margin-bottom: 8px; }
    .panel button { margin-top: 12px; padding: 6px 12px; font-family: monospace;
                    cursor: pointer; background: #222; color: #aaa; border: 1px solid #444; border-radius: 4px; }

    /* Menu Finances */
    .finances-onglets { display: flex; gap: 4px; margin-bottom: 12px; }
    .finances-onglet {
      flex: 1; padding: 6px; font-family: monospace; font-size: 0.85em; cursor: pointer;
      background: #1a1a1a; color: #888; border: 1px solid #333; border-radius: 4px;
    }
    .finances-onglet--actif { background: #222; color: #e0e0e0; border-color: #555; }
    .finances-onglet:hover  { background: #222; }
    .finances-contenu { display: flex; flex-direction: column; gap: 8px; }
    .finances-vide    { color: #555; font-style: italic; font-size: 0.9em; }
    .finances-liste   { list-style: none; display: flex; flex-direction: column; gap: 6px; }
    .finances-ligne   { display: flex; justify-content: space-between; align-items: center;
                        padding: 6px 8px; background: #1a1a1a; border-radius: 4px; }
    .finances-ligne__label  { color: #ccc; font-size: 0.9em; }
    .finances-ligne__valeur { font-size: 0.9em; font-family: monospace; }
    .finances-ligne__valeur--vert  { color: #4caf50; }
    .finances-ligne__valeur--rouge { color: #f44336; }
    .finances-total { display: flex; justify-content: space-between; align-items: center;
                      padding: 8px; border-top: 1px solid #2a2a2a; font-weight: bold; margin-top: 4px; }
    .finances-bilan { display: flex; flex-direction: column; gap: 10px; }
    .finances-bilan__cashflow {
      font-size: 2em; font-weight: bold; text-align: center;
      padding: 16px; border-radius: 6px; background: #1a1a1a;
    }
    .finances-bilan__cashflow--vert  { color: #4caf50; }
    .finances-bilan__cashflow--rouge { color: #f44336; }
    .finances-bilan__detail {
      display: flex; justify-content: space-between;
      color: #888; font-size: 0.85em; padding: 4px 0; border-top: 1px solid #1e1e1e;
    }

    /* Upgrades list */
    .upgrades-list { list-style: none; display: flex; flex-direction: column; gap: 8px; margin-top: 4px; }
    .upgrade-item { padding: 10px; border: 1px solid #333; border-radius: 4px; }
    .upgrade-item--disponible { border-color: #4caf50; }
    .upgrade-item--trop-cher  { opacity: 0.8; }
    .upgrade-item--verrouille { opacity: 0.45; }
    .upgrade-item--achete     { opacity: 0.5; border-color: #2a2a2a; }
    .upgrade-header { display: flex; justify-content: space-between; margin-bottom: 4px; }
    .upgrade-nom    { font-weight: bold; }
    .upgrade-cout   { color: #aaa; }
    .upgrade-cout--rouge { color: #f44336; font-weight: bold; }
    .upgrade-footer { display: flex; justify-content: space-between; align-items: center; }
    .upgrade-effet  { color: #888; font-size: 0.85em; }
    .upgrade-cadenas { font-size: 1em; }
    .upgrade-check  { color: #4caf50; font-weight: bold; }
    .upgrade-btn { padding: 4px 10px; font-family: monospace; cursor: pointer;
                   background: #1e3a1e; color: #4caf50; border: 1px solid #4caf50; border-radius: 3px; }
    .upgrade-btn:disabled { cursor: not-allowed; background: #1a1a1a; color: #555; border-color: #333; }
    .upgrade-prix { font-size: 0.75em; color: #facc15; margin-left: 6px; }

    /* Niveau Commerce */
    .niveau-commerce { margin-bottom: 12px; }
    .niveau-commerce__header { display: flex; justify-content: space-between; margin-bottom: 4px; }
    .niveau-commerce__palier { font-weight: bold; color: #e0e0e0; }
    .niveau-commerce__niv    { color: #ffeb3b; font-size: 0.9em; }
    .xp-piste  { height: 8px; background: #2a2a2a; border-radius: 4px; overflow: hidden; margin-bottom: 3px; }
    .xp-barre  { height: 100%; background: #2196f3; border-radius: 4px; transition: width 0.3s; }
    .xp-label  { color: #666; font-size: 0.8em; text-align: right; }

    /* Ville — carte toujours visible, remplit la zone centrale */
    .ville-container { display: flex; flex-direction: column; flex: 0 0 auto; width: 100%; max-width: 580px; }


    /* Sprite personnage CSS pur */
    .sprite-perso {
      position: absolute;
      z-index: 5;
      width: 14px; height: 22px;
      pointer-events: none;
      transition: left 0.6s ease, top 0.6s ease;
      transform: translate(-50%, -130%);
    }
    .sprite-perso::before { /* tête */
      content: '';
      position: absolute;
      top: 0; left: 1px;
      width: 12px; height: 12px;
      background: #fbbf24;
      border-radius: 50%;
      border: 1px solid #d97706;
    }
    .sprite-perso::after { /* corps */
      content: '';
      position: absolute;
      bottom: 0; left: 2px;
      width: 10px; height: 10px;
      background: #3b82f6;
      border-radius: 2px 2px 0 0;
      border: 1px solid #1d4ed8;
    }

    /* Bâtiment boutique sur la carte */
    .batiment-boutique { cursor: pointer; }

    .panneau-titre { font-size: 1em; font-weight: bold; margin-bottom: 12px; color: #ccc; }

    /* Boutique vue (panneau actif) */
    .boutique-vue { padding: 12px; }
    .boutique-flottants { position: relative; height: 24px; }
    .boutique-flottant  {
      position: absolute; left: 0; top: 0;
      color: #4caf50; font-weight: bold; font-size: 0.85em; white-space: nowrap;
      animation: flotter 0.8s ease-out forwards;
    }
    .boutique-liste { list-style: none; display: flex; flex-direction: column; gap: 8px; }
    .boutique-liste--inline { flex-direction: row; flex-wrap: wrap; gap: 10px; }
    .boutique-item  { display: flex; flex-direction: column; gap: 4px; padding: 8px; border: 1px solid #2a2a2a; border-radius: 4px; min-width: 110px; }
    .boutique-item--disabled { opacity: 0.5; }
    .boutique-item__label { font-size: 0.85em; color: #ddd; }
    .boutique-item__prix  { font-size: 0.8em; color: #888; }
    .boutique-item__btn {
      padding: 4px 8px; font-family: monospace; font-size: 0.8em; cursor: pointer;
      background: #1e3a1e; color: #4caf50; border: 1px solid #4caf50; border-radius: 3px;
    }
    .boutique-item__btn:disabled { cursor: not-allowed; background: #1a1a1a; color: #555; border-color: #333; }

    /* Vue Logement */
    .logement-vue { display: flex; flex-direction: column; gap: 12px; }
    .logement-actuel {
      display: flex; flex-direction: column; gap: 4px;
      padding: 12px; background: #1a1a1a; border: 1px solid #444; border-radius: 6px;
    }
    .logement-actuel__label  { font-size: 0.75em; color: #666; text-transform: uppercase; letter-spacing: 0.08em; }
    .logement-actuel__nom    { font-size: 1.1em; font-weight: bold; color: #e0e0e0; }
    .logement-actuel__bonus  { font-size: 0.85em; color: #4caf50; }
    .logement-actuel__charge { font-size: 0.85em; color: #f44336; }
    .logement-section-titre  { font-size: 0.8em; text-transform: uppercase; letter-spacing: 0.08em; color: #666; margin-top: 4px; }
    .logement-liste          { list-style: none; display: flex; flex-direction: column; gap: 6px; }
    .logement-item {
      padding: 10px; border: 1px solid #333; border-radius: 4px;
      display: flex; flex-direction: column; gap: 6px;
    }
    .logement-item--actuel   { border-color: #4caf50; background: #0d1f0d; }
    .logement-item--verrouille { opacity: 0.45; }
    .logement-item__header   { display: flex; justify-content: space-between; align-items: center; }
    .logement-item__nom      { font-weight: bold; color: #e0e0e0; }
    .logement-item__prix     { color: #aaa; font-size: 0.85em; }
    .logement-item__footer   { display: flex; justify-content: space-between; align-items: center; gap: 6px; }
    .logement-item__bonheur  { font-size: 0.8em; color: #4caf50; }
    .logement-item__charges  { font-size: 0.8em; color: #f44336; }
    .logement-item__badge    { font-size: 0.8em; color: #4caf50; font-weight: bold; }
    .logement-item__btn {
      padding: 4px 10px; font-family: monospace; font-size: 0.8em; cursor: pointer;
      background: #1e3a1e; color: #4caf50; border: 1px solid #4caf50; border-radius: 3px;
    }
    .logement-item__btn:disabled { cursor: not-allowed; background: #1a1a1a; color: #555; border-color: #333; }

    /* Vue Carte */
    .carte-container { display: flex; flex-direction: column; gap: 8px; }

    .carte-map {
      position: relative;
      min-height: 260px;
      background: #0a0a14;
      border: 1px solid #1a1a2e;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 16px 16px;
      overflow: hidden;
    }

    .carte-zone {
      position: absolute;
      transform: translate(-50%, -50%);
      display: flex; flex-direction: column; align-items: center; gap: 2px;
      padding: 8px 12px;
      background: #111827;
      border: 1px solid #374151;
      border-radius: 4px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      min-width: 110px; text-align: center;
      font-family: monospace;
    }
    .carte-zone:hover:not(.carte-zone--locked):not(.carte-zone--active):not(.carte-zone--cooldown):not(.carte-zone--vehicule-bloque) {
      border-color: #7c3aed; background: #1a1033;
    }
    .carte-zone--active          { border-color: #22c55e; background: #052e16; cursor: default; }
    .carte-zone--locked          { border-color: #1f2937; opacity: 0.5; cursor: not-allowed; }
    .carte-zone--cooldown        { border-color: #facc15; opacity: 0.7; cursor: not-allowed; }
    .carte-zone--indispo         { opacity: 0.6; }
    .carte-zone--vehicule-bloque { border-color: #3f3f46; opacity: 0.55; cursor: not-allowed; filter: grayscale(0.6); }

    .carte-zone__emoji           { font-size: 1.8em; line-height: 1; }
    .carte-zone__label           { font-size: 0.72em; color: #9ca3af; }
    .carte-zone__lock            { font-size: 0.68em; color: #4b5563; }
    .carte-zone__badge           { font-size: 0.68em; color: #22c55e; font-weight: bold; }
    .carte-zone__cout            { font-size: 0.68em; color: #facc15; }
    .carte-zone__vehicule-requis { font-size: 1.1em; }

    .carte-info {
      padding: 8px 12px;
      background: #0f0f1a;
      border: 1px solid #1a1a2e;
      border-radius: 4px;
      display: flex; justify-content: space-between; align-items: center;
      font-size: 0.85em; color: #9ca3af;
    }
    .carte-info strong { color: #e0e0e0; }
    .carte-cooldown-global { color: #facc15; font-family: monospace; }
    .carte-message-blocage { margin-top: 8px; padding: 8px 12px; background: #1a0a0a;
                             border: 1px solid #7f1d1d; color: #fca5a5;
                             font-size: 0.85em; text-align: center; }

    /* Immobilier — notif événements */
    .immo-notif { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
                  padding: 8px 16px; background: #1a1a2e; border: 1px solid #7c3aed;
                  color: #e9d5ff; font-size: 0.85em; z-index: 100; pointer-events: none;
                  animation: fadeInOut 4s ease forwards; }
    @keyframes fadeInOut {
      0%   { opacity: 0; transform: translateX(-50%) translateY(8px); }
      15%  { opacity: 1; transform: translateX(-50%) translateY(0); }
      75%  { opacity: 1; }
      100% { opacity: 0; }
    }
    .immo-passif-badge { font-size: 0.8em; padding: 2px 8px;
                         background: #0f172a; border: 1px solid #334155; color: #94a3b8; }

    /* Vue Véhicules */
    .vehicules-vue          { padding: 12px; display: flex; flex-direction: column; gap: 10px; }
    .vehicule-card          { display: flex; align-items: center; gap: 10px; padding: 10px;
                              background: #111; border: 1px solid #2a2a2a; }
    .vehicule-card--actuel  { border-color: #22c55e; background: #052e16; }
    .vehicule-card--depasse { opacity: 0.4; }
    .vehicule-card__emoji   { font-size: 2em; width: 40px; text-align: center; }
    .vehicule-card__info    { flex: 1; display: flex; flex-direction: column; gap: 2px; }
    .vehicule-card__label   { font-size: 0.95em; }
    .vehicule-card__stats   { font-size: 0.72em; color: #9ca3af; }
    .vehicule-card__badge   { font-size: 0.7em; color: #22c55e; }
    .vehicule-card__btn     { padding: 6px 14px; background: #7c3aed; color: #fff;
                              border: none; cursor: pointer; font-family: inherit; font-size: 0.85em; }
    .vehicule-card__btn:disabled { background: #333; color: #666; cursor: not-allowed; }

    /* Vue Ordinateur */
    .ordinateur-vue   { display: flex; flex-direction: column; gap: 12px; }
    .ordinateur-achat {
      display: flex; flex-direction: column; align-items: center; gap: 12px;
      padding: 24px 16px; text-align: center;
    }
    .ordinateur-mock    { font-size: 3em; line-height: 1; }
    .ordinateur-achat p { color: #888; font-size: 0.9em; max-width: 280px; }
    .ordinateur-btn-achat {
      padding: 8px 20px; font-family: monospace; font-size: 0.95em; cursor: pointer;
      background: #1a2233; color: #4d9fff; border: 1px solid #4d9fff; border-radius: 4px;
    }
    .ordinateur-btn-achat:disabled { cursor: not-allowed; background: #1a1a1a; color: #555; border-color: #333; }
    .ordinateur-btn-achat:not(:disabled):hover { background: #1e2d44; }

    .ordinateur-screen { display: flex; flex-direction: column; gap: 12px; }
    .ordinateur-section-titre {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 0.75em; text-transform: uppercase; letter-spacing: 0.08em;
      color: #666; border-bottom: 1px solid #1e1e1e; padding-bottom: 4px;
    }
    .ordinateur-tokens-solde { font-size: 1.2em; color: #a78bfa; font-weight: bold; letter-spacing: 0; text-transform: none; }

    .ordinateur-packs { list-style: none; display: flex; flex-direction: column; gap: 6px; }
    .ordinateur-pack {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 10px; border: 1px solid #2a2a2a; border-radius: 4px; background: #111;
    }
    .ordinateur-pack--indispo { opacity: 0.5; }
    .ordinateur-pack span:first-child { flex: 1; font-size: 0.88em; color: #ccc; }
    .ordinateur-pack span:nth-child(2) { font-size: 0.82em; color: #888; white-space: nowrap; }
    .ordinateur-pack__btn {
      padding: 3px 10px; font-family: monospace; font-size: 0.8em; cursor: pointer;
      background: #1a2233; color: #4d9fff; border: 1px solid #4d9fff; border-radius: 3px;
    }
    .ordinateur-pack__btn:disabled { cursor: not-allowed; background: #1a1a1a; color: #555; border-color: #333; }
    .ordinateur-pack__btn:not(:disabled):hover { background: #1e2d44; }

    .ordinateur-commandes { list-style: none; display: flex; flex-direction: column; gap: 6px; }
    .ordinateur-commande {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 10px; border: 1px solid #2a2a2a; border-radius: 4px; background: #111;
    }
    .ordinateur-commande--disabled { opacity: 0.5; }
    .ordinateur-commande__emoji  { font-size: 1.1em; flex-shrink: 0; }
    .ordinateur-commande__label  { flex: 1; font-size: 0.88em; color: #ccc; }
    .ordinateur-commande__cout   { font-size: 0.8em; color: #a78bfa; white-space: nowrap; }
    .ordinateur-commande__btn {
      padding: 3px 10px; font-family: monospace; font-size: 0.85em; cursor: pointer;
      background: #1a2233; color: #4d9fff; border: 1px solid #4d9fff; border-radius: 3px; flex-shrink: 0;
    }
    .ordinateur-commande__btn:disabled { cursor: not-allowed; background: #1a1a1a; color: #555; border-color: #333; }
    .ordinateur-commande__btn:not(:disabled):hover { background: #1e2d44; }
    .ordinateur-boost-badge {
      font-size: 0.75em; color: #4caf50; border: 1px solid #4caf50;
      border-radius: 3px; padding: 1px 5px; white-space: nowrap;
    }

    /* Badge prix nav */
    .nav-badge--prix {
      display: inline-block; margin-left: 5px;
      font-size: 0.75em; color: #888;
      border: 1px solid #444; border-radius: 3px; padding: 1px 4px;
    }

    /* Vue Téléphone */
    .telephone-vue { display: flex; flex-direction: column; gap: 12px; }

    .telephone-achat {
      display: flex; flex-direction: column; align-items: center; gap: 12px;
      padding: 24px 16px; text-align: center;
    }
    .telephone-mock { font-size: 3em; line-height: 1; }
    .telephone-achat p { color: #888; font-size: 0.9em; max-width: 280px; }
    .telephone-btn-achat {
      padding: 8px 20px; font-family: monospace; font-size: 0.95em; cursor: pointer;
      background: #1a2e1a; color: #4caf50; border: 1px solid #4caf50; border-radius: 4px;
    }
    .telephone-btn-achat:disabled { cursor: not-allowed; background: #1a1a1a; color: #555; border-color: #333; }
    .telephone-btn-achat:not(:disabled):hover { background: #223a22; }

    .telephone-screen {
      display: flex; flex-direction: column; gap: 10px;
      background: #0d0d0d; border: 1px solid #333; border-radius: 8px; padding: 12px;
    }
    .telephone-header {
      display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid #2a2a2a; padding-bottom: 8px; margin-bottom: 2px;
      font-size: 0.85em; color: #888;
    }
    .telephone-abonnes { color: #4caf50; font-weight: bold; font-size: 1em; }

    .telephone-actions { list-style: none; display: flex; flex-direction: column; gap: 6px; }
    .telephone-action {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 10px; border: 1px solid #2a2a2a; border-radius: 5px;
      background: #111;
    }
    .telephone-action--locked  { opacity: 0.45; }
    .telephone-action--cooldown { opacity: 0.7; }
    .telephone-action--disabled { opacity: 0.5; }
    .telephone-action__emoji { font-size: 1.2em; flex-shrink: 0; }
    .telephone-action__label { flex: 1; font-size: 0.9em; color: #ccc; }
    .telephone-action__lock  { font-size: 0.75em; color: #666; white-space: nowrap; }
    .telephone-action__cd    { font-size: 0.8em; color: #888; font-family: monospace; white-space: nowrap; min-width: 32px; text-align: right; }
    .telephone-action__btn {
      padding: 4px 10px; font-family: monospace; font-size: 0.85em; cursor: pointer;
      background: #1e3a1e; color: #4caf50; border: 1px solid #4caf50; border-radius: 3px;
      flex-shrink: 0;
    }
    .telephone-action__btn:hover { background: #223a22; }

    /* Debug */
    .debug { border-top: 1px solid #222; padding-top: 8px; display: flex; gap: 8px; }
    .debug button { padding: 6px 12px; font-family: monospace; cursor: pointer;
                    background: #111; color: #555; border: 1px solid #2a2a2a; border-radius: 4px; }
    .debug__mort { color: #c62828 !important; border-color: #5a1a1a !important; }

    /* Écran de fin de génération */
    .overlay-mort {
      position: fixed; inset: 0;
      background: rgba(0, 0, 0, 0.92);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
    }
    .ecran-mort {
      background: #0d0d0d; border: 1px solid #5a1a1a; border-radius: 8px;
      padding: 28px 32px; width: 100%; max-width: 620px;
      max-height: 90vh; overflow-y: auto;
      display: flex; flex-direction: column; gap: 20px;
      font-family: monospace;
    }
    .overlay-mort__titre {
      font-size: 1.5em; font-weight: bold; color: #fca5a5;
      border-bottom: 1px solid #3a1a1a; padding-bottom: 12px;
    }
    .overlay-mort__sous-titre { font-size: 0.6em; color: #888; margin-top: 4px; font-weight: normal; }
    .overlay-mort__section-titre {
      font-size: 0.78em; text-transform: uppercase; letter-spacing: 0.1em;
      color: #666; margin-bottom: 10px;
    }
    .overlay-mort__recap { display: flex; flex-direction: column; gap: 8px; }
    .overlay-mort__ligne {
      display: flex; justify-content: space-between; align-items: center;
      padding: 6px 10px; background: #111; border: 1px solid #222; border-radius: 3px;
      font-size: 0.88em; color: #ccc;
    }
    .overlay-mort__or { color: #fbbf24; }
    .overlay-mort__lignee { display: flex; flex-direction: column; gap: 8px; }
    .lignee-table-wrap { max-height: 160px; overflow-y: auto; border: 1px solid #222; border-radius: 4px; }
    .lignee-table {
      width: 100%; border-collapse: collapse; font-size: 0.82em;
    }
    .lignee-table th {
      background: #181818; color: #666; text-align: left;
      padding: 5px 10px; border-bottom: 1px solid #2a2a2a; position: sticky; top: 0;
    }
    .lignee-table td { padding: 5px 10px; color: #ccc; border-bottom: 1px solid #1a1a1a; }
    .lignee-table__row--actuelle td { color: #fca5a5; background: #1a0a0a; }
    .lignee-table__or { color: #fbbf24; }
    .boost-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
    }
    .boost-card {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      padding: 10px 6px; border: 1px solid #2a2a2a; border-radius: 5px;
      cursor: pointer; background: #111; transition: border-color 0.15s, background 0.15s;
      font-size: 0.8em; color: #888; text-transform: capitalize;
    }
    .boost-card:hover { border-color: #555; background: #181818; }
    .boost-card--selected { border-color: #a78bfa; background: #1a1033; color: #c4b5fd; }
    .boost-card__emoji { font-size: 1.5em; }
    .boost-card__label { font-size: 0.85em; }
    .btn-continuer {
      padding: 13px 24px; font-family: monospace; font-size: 1em; font-weight: bold;
      cursor: pointer; background: #1a2e1a; color: #4caf50;
      border: 1px solid #4caf50; border-radius: 5px; align-self: stretch;
      letter-spacing: 0.05em;
    }
    .btn-continuer:hover { background: #223a22; }
    /* BTP — chantier actif */
    .btp-chantier-actif {
      margin: 8px 0; padding: 10px 12px;
      background: #0f1a0f; border: 1px solid #166534;
    }
    .btp-chantier-header {
      display: flex; align-items: center; gap: 8px;
      font-size: 0.9em; margin-bottom: 8px;
    }
    .btp-chantier-timer      { color: #facc15; font-size: 0.85em; margin-left: auto; }
    .btp-chantier-recompense { color: #22c55e; font-size: 0.85em; }
    .btp-progress-bar {
      height: 8px; background: #1a2e1a; border: 1px solid #166534; overflow: hidden;
    }
    .btp-progress-fill {
      height: 100%; background: #22c55e;
      transition: width 1s linear;
    }
    .btp-clic-hint { font-size: 0.7em; color: #4b5563; margin-top: 4px; text-align: center; }

    /* Panneau fermer */
    .panel-fermer {
      margin-top: auto; padding: 6px 14px; font-family: monospace; font-size: 0.8em;
      cursor: pointer; background: #1a1a1a; color: #666;
      border: 1px solid #333; border-radius: 4px; align-self: flex-start;
    }
    .panel-fermer:hover { color: #aaa; border-color: #555; }

    /* Panneau upgrades — prend l'espace restant dans zone-centrale */
    .panneau-upgrades {
      background: #141414; border: 1px solid #2a2a2a; border-radius: 6px; padding: 12px;
      flex: 1; overflow-y: auto; width: 100%; max-width: 580px;
    }

    /* Influence zone centrale (barre + label sous la carte) */
    .influence-zone-centrale {
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      padding: 10px 16px; background: #0d0d1a; border-bottom: 1px solid #1e1e2e;
      flex-shrink: 0; width: 100%; max-width: 580px;
    }

    /* Overlay panneau latéral (position absolute dans zone-centrale) */
    .panneau-overlay {
      position: absolute; top: 0; right: 0;
      width: 340px; max-width: 100%; height: 100%;
      background: #131313; border-left: 1px solid #2a2a2a;
      display: flex; flex-direction: column;
      z-index: 10; overflow-y: auto; padding: 16px;
      box-shadow: -4px 0 20px rgba(0,0,0,0.5);
    }
    .panneau-overlay__header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid #222;
      flex-shrink: 0;
    }
    .panneau-overlay__titre { font-size: 1em; font-weight: bold; color: #e0e0e0; }
    .panneau-overlay__fermer {
      background: none; border: none; color: #666; font-size: 1.2em;
      cursor: pointer; padding: 2px 6px; border-radius: 3px;
    }
    .panneau-overlay__fermer:hover { color: #ccc; background: #222; }

    /* Vue Quartier — façade RPG */
    .quartier-vue {
      display: flex; flex-direction: column;
      width: 100%; max-width: 580px;
      padding: 12px; gap: 16px; flex: 1; overflow-y: auto;
    }
    .quartier-breadcrumb {
      display: flex; align-items: center; gap: 10px;
      font-size: 0.85em; color: #888;
    }
    .quartier-retour {
      background: none; border: 1px solid #333; color: #aaa;
      padding: 3px 10px; border-radius: 3px; cursor: pointer; font-family: monospace;
    }
    .quartier-retour:hover { background: #1a1a1a; color: #e0e0e0; }
    .quartier-facade {
      display: flex; gap: 16px; align-items: flex-end;
      padding: 24px 0 0; border-bottom: 3px solid #2a2a2a;
      min-height: 160px; flex-wrap: wrap;
    }
    .batiment-card {
      display: flex; flex-direction: column; align-items: center; cursor: pointer;
    }
    .batiment-card__toit {
      width: 72px; height: 28px; background: #7c3aed;
      clip-path: polygon(0% 100%, 50% 0%, 100% 100%);
    }
    .batiment-card__corps {
      width: 72px; min-height: 80px; background: #1e1e2e;
      border: 1px solid #333; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 4px; padding: 8px 4px;
    }
    .batiment-card__emoji { font-size: 1.6em; }
    .batiment-card__label { font-size: 0.72em; color: #aaa; text-align: center; }
    .batiment-card:hover .batiment-card__corps { background: #252535; border-color: #555; }
    .btn-entrer-secteur {
      align-self: center; padding: 10px 28px;
      font-family: monospace; font-size: 0.95em; cursor: pointer;
      background: #052e16; color: #22c55e;
      border: 1px solid #22c55e; border-radius: 5px;
    }
    .btn-entrer-secteur:hover { background: #0a3d1f; }

    /* Influence */
    .zone-influence {
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      padding: 16px; border: 1px solid #333; border-radius: 8px;
    }
    .influence-abonnes { font-size: 1.1em; color: #a78bfa; }
    .influence-barre-wrap {
      position: relative; width: 100%; height: 16px;
      background: #1e1e2e; border-radius: 8px; overflow: hidden;
    }
    .influence-barre-cible {
      position: absolute; left: 50%; top: 0; width: 2px; height: 100%;
      background: #f59e0b; opacity: 0.7;
    }
    .influence-barre-fill {
      height: 100%; border-radius: 8px;
      background: #7c3aed;
      transition: width 0.05s linear;
    }
    .influence-barre-fill--actif { background: #a78bfa; }
    .influence-precision { font-size: 0.85em; color: #d1d5db; min-height: 1.2em; }
    .btn-influence {
      padding: 14px 28px; font-size: 1.05em; font-family: monospace;
      cursor: pointer; border: 2px solid #7c3aed; background: transparent;
      color: #a78bfa; border-radius: 6px; transition: background 0.1s;
      user-select: none;
    }
    .btn-influence:active { background: #1e1e2e; }
    .influence-hint { font-size: 0.7em; color: #4b5563; }

    /* Commandes illégales */
    .illegales-titre { color: #ef4444; margin-top: 12px; }
    .commandes-illegales { list-style: none; display: flex; flex-direction: column; gap: 8px; }
    .commande-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px; border: 1px solid #3a1a1a; border-radius: 4px;
      background: #1a0a0a;
    }
    .commande-item--locked  { opacity: 0.55; border-color: #2a2a2a; background: #111; }
    .commande-item--cooldown { border-color: #78350f; background: #1c1008; }
    .commande-item__emoji { font-size: 1.3em; flex-shrink: 0; }
    .commande-item__info  { flex: 1; display: flex; flex-direction: column; gap: 2px; }
    .commande-item__label { font-size: 0.9em; font-weight: bold; color: #fca5a5; }
    .commande-item__gains { font-size: 0.75em; color: #888; }
    .commande-item__couche { font-size: 0.7em; color: #6b7280; }
    .commande-item__action { flex-shrink: 0; text-align: right; }
    .commande-item__raison { font-size: 0.72em; color: #6b7280; }
    .commande-item__cd     { font-size: 0.82em; color: #f59e0b; font-family: monospace; }
    .commande-item__btn {
      padding: 4px 10px; font-family: monospace; font-size: 0.85em;
      cursor: pointer; background: #3b0a0a; color: #ef4444;
      border: 1px solid #ef4444; border-radius: 3px;
    }
    .commande-item__btn:hover { background: #5a1010; }

    /* Formations — vue bâtiment écol */
    .formations-vue { display: flex; flex-direction: column; gap: 12px; }
    .formation-active-card {
      padding: 12px; background: #0f1a2e; border: 1px solid #2563eb;
      display: flex; flex-direction: column; gap: 8px;
    }
    .formation-active-header {
      display: flex; align-items: center; gap: 8px;
      font-size: 0.9em; font-weight: bold; color: #93c5fd;
    }
    .formation-timer { margin-left: auto; color: #facc15; font-family: monospace; }
    .formation-barre {
      height: 8px; background: #1e2e4a; border: 1px solid #2563eb; overflow: hidden;
    }
    .formation-barre-fill { height: 100%; background: #3b82f6; transition: width 1s linear; }
    .btn-etudier {
      align-self: flex-start; padding: 4px 12px; font-family: monospace; font-size: 0.82em;
      cursor: pointer; background: #1e2d44; color: #60a5fa; border: 1px solid #3b82f6; border-radius: 3px;
    }
    .btn-etudier:hover { background: #1e3a5f; }

    .formation-liste { list-style: none; display: flex; flex-direction: column; gap: 8px; }
    .formation-item {
      padding: 10px; border: 1px solid #2a2a2a; border-radius: 4px;
      display: flex; flex-direction: column; gap: 6px;
    }
    .formation-item--terminee { border-color: #2a2a2a; opacity: 0.55; }
    .formation-item--en-cours { border-color: #3b82f6; background: #0a1628; }
    .formation-item__header {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 0.9em; color: #e0e0e0;
    }
    .formation-item__meta {
      display: flex; gap: 12px; font-size: 0.8em; color: #888;
    }
    .formation-check  { color: #4caf50; font-weight: bold; }
    .formation-en-cours { font-size: 0.78em; color: #60a5fa; border: 1px solid #3b82f6;
                          padding: 1px 6px; border-radius: 3px; }

    /* Floating texts — variantes événements */
    .boutique-flottant--positif { color: #4caf50; }
    .boutique-flottant--negatif { color: #f97316; }

    /* Overlay événement majeur */
    .overlay-evenement {
      position: fixed; inset: 0;
      background: rgba(0, 0, 0, 0.82);
      display: flex; align-items: center; justify-content: center;
      z-index: 90;
    }
    .overlay-evenement__card {
      background: #0d0d0d; border: 1px solid #78350f; border-radius: 8px;
      padding: 28px 32px; width: 100%; max-width: 480px;
      display: flex; flex-direction: column; gap: 16px;
      font-family: monospace;
    }
    .overlay-evenement__titre {
      font-size: 1.25em; font-weight: bold; color: #fbbf24;
      border-bottom: 1px solid #292524; padding-bottom: 10px;
    }
    .overlay-evenement__message {
      color: #d1d5db; font-size: 0.95em; line-height: 1.5;
    }
    .overlay-evenement__effets {
      list-style: none; display: flex; flex-direction: column; gap: 6px;
    }
    .overlay-evenement__effets li {
      padding: 5px 10px; background: #111; border-radius: 3px;
      font-size: 0.88em; font-weight: bold;
    }
    .evt-effet--positif { color: #4caf50; border-left: 3px solid #4caf50; }
    .evt-effet--negatif { color: #ef4444; border-left: 3px solid #ef4444; }
    .overlay-evenement__btn {
      padding: 10px 20px; font-family: monospace; font-size: 0.95em; font-weight: bold;
      cursor: pointer; background: #1c1008; color: #f59e0b;
      border: 1px solid #78350f; border-radius: 5px; align-self: flex-end;
    }
    .overlay-evenement__btn:hover { background: #2d1a0a; border-color: #fbbf24; }

  </style>
</head>
<body>

  <div id="mount"></div>

  <!-- Vue 3 CDN -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

  <script type="module">
    import { AppRoot, JaugeBar } from './src/ui.js'
    import { startEngine }       from './src/engine.js'

    const { createApp } = Vue

    const app = createApp(AppRoot)
    app.component('jauge-bar', JaugeBar)
    app.mount('#mount')

    // Démarrage automatique du moteur au chargement
    startEngine()
  </script>

</body>
</html>
